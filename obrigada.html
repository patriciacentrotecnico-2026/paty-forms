<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recebido! — Consultoria Coletiva</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    background: white;
    max-width: 480px;
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 60px 36px;
    text-align: center;
  }
  .check {
    width: 72px; height: 72px;
    background: #d4edda;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
    color: #2c5f2d;
  }
  h1 {
    font-size: 24px;
    color: #2c5f2d;
    margin-bottom: 16px;
  }
  p {
    font-size: 15px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 12px;
  }
  strong { color: #2c5f2d; }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>

<div class="container">
  <div class="check">&#10003;</div>
  <h1>Recebido!</h1>
  <p>Sua dúvida foi enviada com sucesso.</p>
  <p>Eu vou selecionar as perguntas mais importantes e responder ao vivo no grupo no <strong>domingo</strong>.</p>
  <p>Fique de olho no grupo!</p>
  <div class="footer">Instituto Patrícia Figueiredo</div>
</div>

</body>
</html>
